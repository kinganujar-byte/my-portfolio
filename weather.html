<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="weather-styles.css">
</head>
<body>
    <div class="container">
        <div class="weather-wrapper">
            <h1>Weather App</h1>
            <p class="subtitle">Check weather in any city</p>

            <div class="search-section">
                <input type="text" id="cityInput" placeholder="Enter city name..." class="city-input">
                <button id="searchBtn" class="search-btn">Search</button>
            </div>

            <div id="weatherContent" class="weather-content">
                <div class="welcome-message">
                    <p>🌍 Enter a city name to check the weather</p>
                </div>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <div class="recent-cities">
                <h3>Recent Searches</h3>
                <div id="recentList" class="recent-list"></div>
            </div>
        </div>
    </div>

    <script src="weather.js"></script>
</body>
</html>
