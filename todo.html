<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="todo-styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-wrapper">
            <h1>My Todo List</h1>
            <p class="subtitle">Stay organized and productive</p>

            <div class="input-section">
                <input type="text" id="todoInput" placeholder="Add a new task..." class="todo-input">
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <ul id="todoList" class="todo-list">
                <!-- Tasks will be added here -->
            </ul>

            <div class="stats">
                <span id="taskCount">0 tasks remaining</span>
                <button id="clearBtn" class="clear-btn">Clear Completed</button>
            </div>
        </div>
    </div>

    <script src="todo.js"></script>
</body>
</html>
